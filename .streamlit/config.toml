[browser]
gatherUsageStats = false

[server]
headless = true
address = "localhost"

[theme]
base = "light"
primaryColor = "#00C805"
backgroundColor = "#F7F8FA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#101418"
linkColor = "#047857"
borderColor = "#D9E0E8"
showWidgetBorder = true
showSidebarBorder = true
baseRadius = "8px"
buttonRadius = "8px"
font = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
headingFont = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
baseFontSize = 15
headingFontWeights = [650, 650, 600, 600, 600, 600]
greenColor = "#00A854"
redColor = "#E5484D"
orangeColor = "#F59E0B"
blueColor = "#2563EB"
violetColor = "#7C3AED"
grayColor = "#64748B"
chartCategoricalColors = ["#00C805", "#2563EB", "#F59E0B", "#7C3AED", "#E5484D", "#0891B2", "#64748B"]

[theme.sidebar]
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F1F5F9"
borderColor = "#D9E0E8"
textColor = "#101418"
primaryColor = "#00A854"
